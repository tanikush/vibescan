name: VibeScan Security Check

on:
  push:
    branches: [main, master, develop]

  pull_request:
    branches: [main, master]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install VibeScan
        run: pip install -e .

      - name: Run VibeScan
        run: vibescan scan vibescan --output report.html

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vibescan-report
          path: report.html